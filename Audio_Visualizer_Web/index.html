<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Natural Audio Visualizer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="container">
        <h1>🌿 Natural Visualizer</h1>
        <input type="file" id="audioFile" accept="audio/*">
    </div>

    <div id="player-controls">
    <button id="playPauseBtn" class="control-btn">II</button>
    <input type="range" id="seekBar" value="0" max="100">
    <button id="changeSongBtn" class="control-btn" style="width: auto; padding: 0 15px; border-radius: 20px;">+ เปลี่ยนเพลง</button>
    </div>
    <div id="song-title" style="position: fixed; top: 20px; width: 100%; text-align: center; z-index: 20; font-weight: bold; font-size: 1.2rem; display: none;">
    กำลังเล่น: <span id="file-name"></span>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
